# ─────────────────────────────────────────────────────────────────────────────
# prometheus.yml — Scrape configuration for all microservices
#
# Prometheus pulls metrics from each service's /actuator/prometheus endpoint.
# This file must be at the project root and is mounted into the Prometheus
# container via docker-compose.yml.
#
# Verify metrics are exposed: curl http://localhost:<port>/actuator/prometheus
# ─────────────────────────────────────────────────────────────────────────────

global:
  # How often Prometheus scrapes each target
  scrape_interval: 15s
  # Timeout for a single scrape request
  scrape_timeout: 10s
  # How often rules are re-evaluated
  evaluation_interval: 15s

scrape_configs:

  # ── Prometheus self-monitoring ───────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # ── Eureka Server ────────────────────────────────────────────────────────
  - job_name: eureka-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["eureka-server:8761"]
        labels:
          application: eureka-server

  # ── API Gateway ──────────────────────────────────────────────────────────
  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["api-gateway:8080"]
        labels:
          application: api-gateway

  # ── User Service ─────────────────────────────────────────────────────────
  - job_name: user-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["user-service:8081"]
        labels:
          application: user-service

  # ── Product Service ──────────────────────────────────────────────────────
  - job_name: product-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["product-service:8082"]
        labels:
          application: product-service

  # ── Order Service ────────────────────────────────────────────────────────
  - job_name: order-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["order-service:8083"]
        labels:
          application: order-service

  # ── Payment Service ──────────────────────────────────────────────────────
  - job_name: payment-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["payment-service:8084"]
        labels:
          application: payment-service

  # ── Notification Service ─────────────────────────────────────────────────
  - job_name: notification-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["notification-service:8085"]
        labels:
          application: notification-service
