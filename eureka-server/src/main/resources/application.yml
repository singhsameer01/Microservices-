# Write your configuration here.
# See eureka-server/README.md for a plain-English explanation of every setting.

spring:
  application:
    name: eureka-server

server:
  port: 8761

eureka:
  instance:
    hostname: localhost
  
  client:
    register-with-eureka: false
    fetch-registry: false

    service-url:
      defaultZone: http:${eureka.instance.hostname}:${server.port}/eureka/
  
  server:
    wait-time-in-ms-when-sync-empty: 0


management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health: 
      show-details: always